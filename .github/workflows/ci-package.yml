name: CI Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  package-glibc:
    name: Linux packages (glibc)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CMake >= 3.25
        uses: lukka/get-cmake@latest
        with:
          cmake-version: '3.25.0'

      - name: Install apt packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            pkg-config \
            libboost-all-dev \
            dpkg-dev \
            fakeroot \
            rpm \
            ca-certificates \
            libssl-dev \
            liburing-dev \
            libyaml-cpp-dev

      - name: Configure DEB/TGZ package tree
        run: |
          cmake -S . -B build-glibc-deb -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBSRVCORE_BUILD_TESTS=OFF \
            -DBSRVCORE_BUILD_EXAMPLES=OFF \
            -DBSRVCORE_BUILD_BENCHMARKS=OFF \
            -DBSRVCORE_BUILD_TOOLS=ON \
            "-DBSRVCORE_CPACK_GENERATORS=DEB;TGZ" \
            -DBSRVCORE_PACKAGE_NAME_SUFFIX=-glibc \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build DEB/TGZ package tree
        run: cmake --build build-glibc-deb --parallel

      - name: Package with CPack (DEB, TGZ)
        run: |
          cd build-glibc-deb
          cpack -G DEB
          cpack -G TGZ

      - name: Configure RPM package tree
        run: |
          cmake -S . -B build-glibc-rpm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_INSTALL_LIBDIR=lib64 \
            -DBSRVCORE_BUILD_TESTS=OFF \
            -DBSRVCORE_BUILD_EXAMPLES=OFF \
            -DBSRVCORE_BUILD_BENCHMARKS=OFF \
            -DBSRVCORE_BUILD_TOOLS=ON \
            "-DBSRVCORE_CPACK_GENERATORS=RPM" \
            -DBSRVCORE_PACKAGE_NAME_SUFFIX=-glibc \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build RPM package tree
        run: cmake --build build-glibc-rpm --parallel

      - name: Package with CPack (RPM)
        run: |
          cd build-glibc-rpm
          cpack -G RPM

      - name: Collect generated packages
        run: |
          mkdir -p packages
          find build-glibc-deb build-glibc-rpm -maxdepth 1 -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.tgz" \) \
            -print0 | xargs -0 -I{} cp -v "{}" packages/
          echo "Collected files:"
          ls -lah packages || true

      - name: Upload packages as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-glibc
          path: packages/*

      - name: Create GitHub Release and upload packages
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-musl:
    name: Linux packages (musl + clang, experimental)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install CMake >= 3.25
        uses: lukka/get-cmake@latest
        with:
          cmake-version: '3.25.0'

      - name: Install musl toolchain packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            pkg-config \
            clang \
            lld \
            musl-tools \
            libc++-dev \
            libc++abi-dev \
            libboost-all-dev \
            libssl-dev \
            liburing-dev \
            libyaml-cpp-dev

      - name: Configure musl package tree
        run: |
          cmake -S . -B build-musl -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBSRVCORE_BUILD_TESTS=OFF \
            -DBSRVCORE_BUILD_EXAMPLES=OFF \
            -DBSRVCORE_BUILD_BENCHMARKS=OFF \
            -DBSRVCORE_BUILD_TOOLS=ON \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            "-DCMAKE_C_FLAGS=--target=x86_64-linux-musl" \
            "-DCMAKE_CXX_FLAGS=--target=x86_64-linux-musl -stdlib=libc++" \
            "-DCMAKE_EXE_LINKER_FLAGS=--target=x86_64-linux-musl -fuse-ld=lld" \
            "-DCMAKE_SHARED_LINKER_FLAGS=--target=x86_64-linux-musl -fuse-ld=lld" \
            "-DBSRVCORE_CPACK_GENERATORS=TGZ" \
            -DBSRVCORE_PACKAGE_NAME_SUFFIX=-musl \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build musl package tree
        run: cmake --build build-musl --parallel

      - name: Package with CPack (TGZ)
        run: |
          cd build-musl
          cpack -G TGZ

      - name: Collect generated packages
        run: |
          mkdir -p packages
          find build-musl -maxdepth 1 -type f \
            \( -name "*.tar.gz" -o -name "*.tgz" \) \
            -print0 | xargs -0 -I{} cp -v "{}" packages/
          echo "Collected files:"
          ls -lah packages || true

      - name: Upload packages as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: packages-musl
          path: packages/*

      - name: Create GitHub Release and upload packages
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
