name: CI Package

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  package-glibc:
    name: Linux packages (glibc)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install CMake >= 3.25
        uses: lukka/get-cmake@v4.3.0
        with:
          cmakeVersion: '3.25.0'

      - name: Install apt packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            pkg-config \
            libboost-all-dev \
            dpkg-dev \
            fakeroot \
            rpm \
            ca-certificates \
            libssl-dev \
            liburing-dev \
            libyaml-cpp-dev

      - name: Configure DEB/TGZ package tree
        run: |
          cmake -S . -B build-glibc-deb -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBSRVCORE_BUILD_TESTS=OFF \
            -DBSRVCORE_BUILD_EXAMPLES=OFF \
            -DBSRVCORE_BUILD_BENCHMARKS=OFF \
            -DBSRVCORE_BUILD_TOOLS=ON \
            "-DBSRVCORE_CPACK_GENERATORS=DEB;TGZ" \
            -DBSRVCORE_PACKAGE_NAME_SUFFIX=-glibc \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build DEB/TGZ package tree
        run: cmake --build build-glibc-deb --parallel

      - name: Package with CPack (DEB, TGZ)
        run: |
          cd build-glibc-deb
          cpack -G DEB
          cpack -G TGZ

      - name: Configure RPM package tree
        run: |
          cmake -S . -B build-glibc-rpm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_INSTALL_LIBDIR=lib64 \
            -DBSRVCORE_BUILD_TESTS=OFF \
            -DBSRVCORE_BUILD_EXAMPLES=OFF \
            -DBSRVCORE_BUILD_BENCHMARKS=OFF \
            -DBSRVCORE_BUILD_TOOLS=ON \
            "-DBSRVCORE_CPACK_GENERATORS=RPM" \
            -DBSRVCORE_PACKAGE_NAME_SUFFIX=-glibc \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build RPM package tree
        run: cmake --build build-glibc-rpm --parallel

      - name: Package with CPack (RPM)
        run: |
          cd build-glibc-rpm
          cpack -G RPM

      - name: Collect generated packages
        run: |
          mkdir -p packages
          find build-glibc-deb build-glibc-rpm -maxdepth 1 -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.tgz" \) \
            -print0 | xargs -0 -I{} cp -v "{}" packages/
          echo "Collected files:"
          ls -lah packages || true

      - name: Upload packages as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages-glibc
          path: packages/*

  package-musl:
    name: Linux packages (musl)
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install apk packages
        run: |
          apk add --no-cache \
            bash \
            build-base \
            cmake \
            ninja \
            pkgconf \
            git \
            ca-certificates \
            boost-dev \
            openssl-dev \
            liburing-dev \
            yaml-cpp-dev \
            linux-headers \
            tar \
            gzip

      - name: Configure musl package tree
        run: |
          cmake -S . -B build-musl -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBSRVCORE_BUILD_TESTS=OFF \
            -DBSRVCORE_BUILD_EXAMPLES=OFF \
            -DBSRVCORE_BUILD_BENCHMARKS=OFF \
            -DBSRVCORE_BUILD_TOOLS=ON \
            "-DBSRVCORE_CPACK_GENERATORS=TGZ" \
            -DBSRVCORE_PACKAGE_NAME_SUFFIX=-musl \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build musl package tree
        run: cmake --build build-musl --parallel

      - name: Package with CPack (TGZ)
        run: |
          cd build-musl
          cpack -G TGZ

      - name: Collect generated packages
        run: |
          mkdir -p packages
          find build-musl -maxdepth 1 -type f \
            \( -name "*.tar.gz" -o -name "*.tgz" \) \
            -print0 | xargs -0 -I{} cp -v "{}" packages/
          echo "Collected files:"
          ls -lah packages || true

      - name: Upload packages as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages-musl
          path: packages/*

  package-macos:
    name: macOS packages
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install CMake >= 3.25
        uses: lukka/get-cmake@v4.3.0
        with:
          cmakeVersion: '3.25.0'

      - name: Install macOS dependencies
        run: |
          brew update
          brew install ninja pkg-config llvm boost openssl@3
          brew upgrade llvm || true
          brew list --versions llvm

      - name: Show macOS compiler versions
        run: |
          llvm_prefix="$(brew --prefix llvm)"
          "$llvm_prefix/bin/clang" --version
          "$llvm_prefix/bin/clang++" --version

      - name: Configure macOS package tree
        run: |
          llvm_prefix="$(brew --prefix llvm)"
          cmake -S . -B build-macos -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_C_COMPILER="$llvm_prefix/bin/clang" \
            -DCMAKE_CXX_COMPILER="$llvm_prefix/bin/clang++" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix boost);$(brew --prefix openssl@3)" \
            -DOpenSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBSRVCORE_BUILD_TESTS=OFF \
            -DBSRVCORE_BUILD_EXAMPLES=OFF \
            -DBSRVCORE_BUILD_BENCHMARKS=OFF \
            -DBSRVCORE_BUILD_TOOLS=ON \
            "-DBSRVCORE_CPACK_GENERATORS=TGZ" \
            -DBSRVCORE_PACKAGE_NAME_SUFFIX=-apple \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5

      - name: Build macOS package tree
        run: cmake --build build-macos --parallel

      - name: Package with CPack (TGZ)
        run: |
          cd build-macos
          cpack -G TGZ

      - name: Collect generated packages
        run: |
          mkdir -p packages
          find build-macos -maxdepth 1 -type f \
            \( -name "*.tar.gz" -o -name "*.tgz" \) \
            -print0 | xargs -0 -I{} cp -v "{}" packages/
          echo "Collected files:"
          ls -lah packages || true

      - name: Upload packages as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: packages-macos
          path: packages/*

  release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - package-glibc
      - package-musl
      - package-macos

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          path: packages
          merge-multiple: true

      - name: Show release files
        run: ls -lah packages

      - name: Create GitHub Release and upload packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
