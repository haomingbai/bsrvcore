name: CI Tests

on:
  push:
    branches:
      - "**"
  pull_request: {}

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.suite }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        suite:
          - unit
          - integration
          - stress

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install CMake >= 3.25
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: '3.25.0'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            pkg-config \
            libboost-all-dev \
            libssl-dev \
            liburing-dev \
            libyaml-cpp-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja pkg-config gcc boost openssl@3

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          git clone https://github.com/microsoft/vcpkg $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat"
          & "$vcpkgRoot\vcpkg.exe" install boost-asio boost-beast boost-system boost-url boost-json boost-program-options boost-regex boost-uuid openssl --triplet x64-windows
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_TOOLCHAIN_FILE=$vcpkgRoot\scripts\buildsystems\vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_TARGET_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure Linux test tree
        if: runner.os == 'Linux'
        run: |
          stress_flag=OFF
          if [[ '${{ matrix.suite }}' == 'stress' ]]; then
            stress_flag=ON
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBSRVCORE_BUILD_TESTS=ON \
            -DBSRVCORE_ENABLE_STRESS_TESTS="$stress_flag" \
            -DBSRVCORE_BUILD_EXAMPLES=OFF \
            -DBSRVCORE_BUILD_BENCHMARKS=OFF \
            -DBSRVCORE_BUILD_TOOLS=OFF

      - name: Configure macOS test tree
        if: runner.os == 'macOS'
        run: |
          gcc_prefix="$(brew --prefix gcc)"
          cxx_compiler="$(ls "$gcc_prefix"/bin/g++-* | sort -V | tail -n1)"
          c_compiler="${cxx_compiler/g++-/gcc-}"
          stress_flag=OFF
          if [[ '${{ matrix.suite }}' == 'stress' ]]; then
            stress_flag=ON
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER="$c_compiler" \
            -DCMAKE_CXX_COMPILER="$cxx_compiler" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix boost);$(brew --prefix openssl@3)" \
            -DOpenSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBSRVCORE_BUILD_TESTS=ON \
            -DBSRVCORE_ENABLE_STRESS_TESTS="$stress_flag" \
            -DBSRVCORE_BUILD_EXAMPLES=OFF \
            -DBSRVCORE_BUILD_BENCHMARKS=OFF \
            -DBSRVCORE_BUILD_TOOLS=OFF

      - name: Configure Windows test tree
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stressFlag = if ('${{ matrix.suite }}' -eq 'stress') { 'ON' } else { 'OFF' }
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" `
            -DVCPKG_TARGET_TRIPLET="$env:VCPKG_TARGET_TRIPLET" `
            -DBSRVCORE_BUILD_TESTS=ON `
            -DBSRVCORE_ENABLE_STRESS_TESTS=$stressFlag `
            -DBSRVCORE_BUILD_EXAMPLES=OFF `
            -DBSRVCORE_BUILD_BENCHMARKS=OFF `
            -DBSRVCORE_BUILD_TOOLS=OFF

      - name: Build Linux test tree
        if: runner.os == 'Linux'
        run: cmake --build build --parallel

      - name: Build macOS test tree
        if: runner.os == 'macOS'
        run: cmake --build build --parallel

      - name: Build Windows test tree
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Run Linux tests
        if: runner.os == 'Linux'
        run: |
          ctest --test-dir build --output-on-failure --parallel 4 -L '${{ matrix.suite }}'

      - name: Run macOS tests
        if: runner.os == 'macOS'
        run: |
          ctest --test-dir build --output-on-failure --parallel 4 -L '${{ matrix.suite }}'

      - name: Run Windows tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ctest --test-dir build --build-config RelWithDebInfo --output-on-failure --parallel 4 -L '${{ matrix.suite }}'