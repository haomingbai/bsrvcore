name: CI Tests

on:
  push:
    branches:
      - "**"
  pull_request: {}

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.suite }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        suite:
          - unit
          - integration
          - stress

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Install CMake >= 3.25
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: '3.25.0'

      - name: Restore Windows vcpkg cache
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            .vcpkg-cache\archives
            .vcpkg-cache\downloads
          key: ${{ runner.os }}-vcpkg-x64-windows-${{ hashFiles('.github/workflows/ci-test.yml') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-x64-windows-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ninja-build \
            pkg-config \
            libboost-all-dev \
            libssl-dev \
            liburing-dev \
            libyaml-cpp-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install ninja pkg-config llvm boost openssl@3
          brew upgrade llvm || true
          brew list --versions llvm

      - name: Show macOS compiler versions
        if: runner.os == 'macOS'
        run: |
          llvm_prefix="$(brew --prefix llvm)"
          "$llvm_prefix/bin/clang" --version
          "$llvm_prefix/bin/clang++" --version

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Invoke-WithRetry {
            param(
              [string]$Description,
              [scriptblock]$Action,
              [int]$MaxAttempts = 5
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              try {
                Write-Host "$Description (attempt $attempt/$MaxAttempts)"
                $global:LASTEXITCODE = 0
                & $Action
                if ($LASTEXITCODE -ne 0) {
                  throw "$Description failed with exit code $LASTEXITCODE"
                }
                return
              } catch {
                if ($attempt -eq $MaxAttempts) {
                  throw
                }

                $sleepSeconds = 15 * $attempt
                Write-Host "$Description failed: $_"
                Write-Host "Retrying in $sleepSeconds seconds..."
                Start-Sleep -Seconds $sleepSeconds
              }
            }
          }

          $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
          $cacheRoot = Join-Path $env:GITHUB_WORKSPACE '.vcpkg-cache'
          $downloadsDir = Join-Path $cacheRoot 'downloads'
          $archivesDir = Join-Path $cacheRoot 'archives'
          New-Item -ItemType Directory -Force -Path $downloadsDir | Out-Null
          New-Item -ItemType Directory -Force -Path $archivesDir | Out-Null

          if (Test-Path $vcpkgRoot) {
            Remove-Item -Recurse -Force $vcpkgRoot
          }

          Invoke-WithRetry 'Clone vcpkg' {
            git clone --depth 1 --filter=blob:none https://github.com/microsoft/vcpkg $vcpkgRoot
          }

          Invoke-WithRetry 'Bootstrap vcpkg' {
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }

          $packages = @(
            'boost-asio',
            'boost-beast',
            'boost-system',
            'boost-url',
            'boost-json',
            'boost-program-options',
            'boost-regex',
            'boost-uuid',
            'openssl'
          )

          $env:VCPKG_FEATURE_FLAGS = 'binarycaching'
          $env:VCPKG_DOWNLOADS = $downloadsDir
          $env:VCPKG_DEFAULT_BINARY_CACHE = $archivesDir

          Invoke-WithRetry 'Install vcpkg dependencies' {
            & "$vcpkgRoot\vcpkg.exe" install @packages --triplet x64-windows --clean-after-build
          }

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CMAKE_TOOLCHAIN_FILE=$vcpkgRoot\scripts\buildsystems\vcpkg.cmake" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_TARGET_TRIPLET=x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_FEATURE_FLAGS=$env:VCPKG_FEATURE_FLAGS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_DOWNLOADS=$downloadsDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VCPKG_DEFAULT_BINARY_CACHE=$archivesDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure Linux test tree
        if: runner.os == 'Linux'
        run: |
          stress_flag=OFF
          if [[ '${{ matrix.suite }}' == 'stress' ]]; then
            stress_flag=ON
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DBSRVCORE_BUILD_TESTS=ON \
            -DBSRVCORE_ENABLE_STRESS_TESTS="$stress_flag" \
            -DBSRVCORE_BUILD_EXAMPLES=OFF \
            -DBSRVCORE_BUILD_BENCHMARKS=OFF \
            -DBSRVCORE_BUILD_TOOLS=OFF

      - name: Configure macOS test tree
        if: runner.os == 'macOS'
        run: |
          llvm_prefix="$(brew --prefix llvm)"
          stress_flag=OFF
          if [[ '${{ matrix.suite }}' == 'stress' ]]; then
            stress_flag=ON
          fi
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER="$llvm_prefix/bin/clang" \
            -DCMAKE_CXX_COMPILER="$llvm_prefix/bin/clang++" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix boost);$(brew --prefix openssl@3)" \
            -DOpenSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DBoost_NO_BOOST_CMAKE=ON \
            -DBSRVCORE_BUILD_TESTS=ON \
            -DBSRVCORE_ENABLE_STRESS_TESTS="$stress_flag" \
            -DBSRVCORE_BUILD_EXAMPLES=OFF \
            -DBSRVCORE_BUILD_BENCHMARKS=OFF \
            -DBSRVCORE_BUILD_TOOLS=OFF

      - name: Configure Windows test tree
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stressFlag = if ('${{ matrix.suite }}' -eq 'stress') { 'ON' } else { 'OFF' }
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:CMAKE_TOOLCHAIN_FILE" `
            -DVCPKG_TARGET_TRIPLET="$env:VCPKG_TARGET_TRIPLET" `
            -DBUILD_SHARED_LIBS=OFF `
            -DBSRVCORE_BUILD_TESTS=ON `
            -DBSRVCORE_ENABLE_STRESS_TESTS=$stressFlag `
            -DBSRVCORE_BUILD_EXAMPLES=OFF `
            -DBSRVCORE_BUILD_BENCHMARKS=OFF `
            -DBSRVCORE_BUILD_TOOLS=OFF

      - name: Build Linux test tree
        if: runner.os == 'Linux'
        run: cmake --build build --parallel

      - name: Build macOS test tree
        if: runner.os == 'macOS'
        run: cmake --build build --parallel

      - name: Build Windows test tree
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Run Linux tests
        if: runner.os == 'Linux'
        run: |
          ctest --test-dir build --output-on-failure --parallel 4 -L '${{ matrix.suite }}'

      - name: Run macOS tests
        if: runner.os == 'macOS'
        run: |
          ctest --test-dir build --output-on-failure --parallel 4 -L '${{ matrix.suite }}'

      - name: Run Windows tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ctest --test-dir build --build-config RelWithDebInfo --output-on-failure --parallel 4 -L '${{ matrix.suite }}'
