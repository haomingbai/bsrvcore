server:
  # Number of I/O threads (passed to HttpServer::Start).
  thread_count: 4
  # Optional connection-cap control.
  has_max_connection: true
  max_connection: 4096
  # Optional: full worker executor configuration.
  executor:
    core_thread_num: 4
    max_thread_num: 8
    fast_queue_capacity: 256
    thread_clean_interval: 60000
    task_scan_interval: 100
    suspend_time: 1

listeners:
  - address: "0.0.0.0"
    port: 8080

services:
  - slot: 0
    factory: "./plugins/libexample_bsrvrun_demo_service_plugin.so"
    params:
      prefix: "service|"

global:
  default_handler:
    factory: "./plugins/libexample_bsrvrun_demo_handler_plugin.so"
    params:
      service_slot: "0"
      body: "default|"
  aspects:
    - factory: "./plugins/libexample_bsrvrun_demo_aspect_plugin.so"
      params:
        pre: "gpre|"
        post: "gpost|"

routes:
  - method: "GET"
    path: "/demo"
    ignore_default_route: false
    handler:
      factory: "./plugins/libexample_bsrvrun_demo_handler_plugin.so"
      params:
        service_slot: "0"
        body: "handler|"
    aspects:
      - factory: "./plugins/libexample_bsrvrun_demo_aspect_plugin.so"
        params:
          pre: "rpre|"
          post: "rpost|"
